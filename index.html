<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Malina's Secret Garden</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --rose:    #f4a7b9;
      --peach:   #fddcb5;
      --gold:    #f9c74f;
      --sage:    #c9e4ca;
      --cream:   #fdf6ec;
      --text:    #4a3040;
      --shadow:  rgba(180,100,120,0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(160deg, #ffe4ec 0%, #fdf6ec 40%, #e8f5e9 100%);
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── Floating petals ── */
    .petal {
      position: fixed;
      pointer-events: none;
      opacity: 0;
      animation: fall linear infinite;
      font-size: 1.4rem;
      z-index: 0;
    }
    @keyframes fall {
      0%   { transform: translateY(-40px) rotate(0deg);   opacity: 0.7; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0;   }
    }

    /* ── Header ── */
    .header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 36px 20px 16px;
    }
    .avatar-ring {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--rose), var(--gold));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
      box-shadow: 0 4px 24px var(--shadow);
      font-size: 2.8rem;
    }
    .header h1 {
      font-size: 1.5rem;
      font-style: italic;
      color: var(--text);
      letter-spacing: 0.04em;
    }
    .header p {
      font-size: 0.85rem;
      color: #9a6a7a;
      margin-top: 4px;
    }

    /* ── Phase badge ── */
    .phase-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.75);
      border: 1px solid var(--rose);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.8rem;
      margin-top: 10px;
      color: #9a3060;
      box-shadow: 0 2px 8px var(--shadow);
    }

    /* ── Garden sections ── */
    .garden {
      position: relative;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 16px 16px 100px;
    }

    .area {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 20px 14px;
      text-align: center;
      box-shadow: 0 4px 18px var(--shadow);
      border: 1px solid rgba(244,167,185,0.3);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      user-select: none;
    }
    .area:active { transform: scale(0.96); }
    .area .icon  { font-size: 2.4rem; margin-bottom: 8px; display: block; }
    .area .name  { font-size: 0.82rem; font-weight: 600; color: var(--text); line-height: 1.3; }
    .area .desc  { font-size: 0.72rem; color: #9a7a88; margin-top: 4px; }

    /* ── CTA button ── */
    .cta {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      padding: 14px 20px 20px;
      background: linear-gradient(to top, rgba(255,240,245,0.98) 80%, transparent);
    }
    .cta button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #f4a7b9, #f9c74f);
      color: #fff;
      font-size: 1rem;
      font-family: 'Georgia', serif;
      font-style: italic;
      font-weight: 600;
      letter-spacing: 0.03em;
      box-shadow: 0 6px 20px rgba(244,167,185,0.5);
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .cta button:active { opacity: 0.85; }

    /* ── Sparkle burst on tap ── */
    .sparkle {
      position: fixed;
      pointer-events: none;
      font-size: 1.6rem;
      animation: burst 0.7s ease-out forwards;
      z-index: 99;
    }
    @keyframes burst {
      0%   { transform: scale(0) rotate(0deg);   opacity: 1; }
      100% { transform: scale(2.2) rotate(180deg); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- Floating petals -->
<div id="petals"></div>

<!-- Header -->
<div class="header">
  <div class="avatar-ring">🌹</div>
  <h1>Malina's Secret Garden</h1>
  <p>Nur für dich… 🫶</p>
  <div class="phase-badge" id="phase-badge">🌱 Kennenlernen</div>
</div>

<!-- Garden areas -->
<div class="garden">
  <div class="area" data-area="bloom" onclick="onAreaTap(this, event)">
    <span class="icon">🌸</span>
    <span class="name">Body Bloom Meadow</span>
    <span class="desc">Bilder &amp; Momente</span>
  </div>
  <div class="area" data-area="kitchen" onclick="onAreaTap(this, event)">
    <span class="icon">🍒</span>
    <span class="name">Kitchen Blossom Grove</span>
    <span class="desc">Rezepte &amp; Videos</span>
  </div>
  <div class="area" data-area="soul" onclick="onAreaTap(this, event)">
    <span class="icon">🌿</span>
    <span class="name">Soul Whisper Willow</span>
    <span class="desc">Gedanken &amp; Briefe</span>
  </div>
  <div class="area" data-area="vault" onclick="onAreaTap(this, event)">
    <span class="icon">🔮</span>
    <span class="name">Secret Growth Vault</span>
    <span class="desc">Exklusiv ✨</span>
  </div>
</div>

<!-- CTA -->
<div class="cta">
  <button onclick="openChat()">💬 Mit Malina sprechen…</button>
</div>

<script>
  // ── Telegram WebApp init ──────────────────────────────────────────────────
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#fdf6ec');
  }

  // ── Phase labels ─────────────────────────────────────────────────────────
  const phaseLabels = {
    1: '🌱 Kennenlernen',
    2: '🌷 Näher kennen',
    3: '🌹 Vertraut',
    4: '🍒 Ganz nah',
  };

  // Read phase from initData or fallback to 1
  let userPhase = 1;
  try {
    const raw = tg?.initDataUnsafe?.user;
    // Phase wird vom Bot via URL-param oder start_param übergeben
    const params = new URLSearchParams(window.location.search);
    const p = parseInt(params.get('phase') || '1', 10);
    if (p >= 1 && p <= 4) userPhase = p;
  } catch (_) {}

  document.getElementById('phase-badge').textContent = phaseLabels[userPhase] || phaseLabels[1];

  // ── Floating petals ───────────────────────────────────────────────────────
  const petalEmojis = ['🌸', '🌺', '🌹', '✨', '🦋', '🌼', '🍀'];
  const container = document.getElementById('petals');

  function spawnPetal() {
    const el = document.createElement('div');
    el.className = 'petal';
    el.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    const dur = 6 + Math.random() * 8;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = Math.random() * dur + 's';
    el.style.fontSize = (1 + Math.random() * 0.8) + 'rem';
    container.appendChild(el);
    setTimeout(() => el.remove(), (dur + 2) * 1000);
  }

  // Spawn initial petals
  for (let i = 0; i < 12; i++) spawnPetal();
  setInterval(spawnPetal, 1800);

  // ── Sparkle on tap ────────────────────────────────────────────────────────
  function spawnSparkle(x, y) {
    const el = document.createElement('div');
    el.className = 'sparkle';
    el.textContent = ['✨', '🌸', '💫', '🌹'][Math.floor(Math.random() * 4)];
    el.style.left = (x - 16) + 'px';
    el.style.top  = (y - 16) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 750);
  }

  // ── Area tap ──────────────────────────────────────────────────────────────
  function onAreaTap(el, evt) {
    spawnSparkle(evt.clientX, evt.clientY);
    const area = el.dataset.area;

    if (area === 'vault' && userPhase < 4) {
      tg?.showPopup({
        title: '🔮 Nur für Vertraute…',
        message: 'Dieser Bereich öffnet sich, wenn wir uns besser kennen. Chatte mit mir und unterstütze mich — dann wächst unser Garten 🌹',
        buttons: [{ type: 'ok', text: 'Verstanden 🫶' }],
      });
      return;
    }

    // Send area selection back to bot
    tg?.sendData(JSON.stringify({ action: 'area', area }));
  }

  // ── Open chat ─────────────────────────────────────────────────────────────
  function openChat() {
    tg?.close();   // closes Mini App and returns to chat
  }
</script>
</body>
</html>
